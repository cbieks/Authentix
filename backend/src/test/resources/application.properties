# Tests run without Docker/MySQL: in-memory H2, Hibernate creates schema, Flyway off.
spring.datasource.url=jdbc:h2:mem:authentix_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

jwt.secret=test-jwt-secret-min-256-bits-for-hs256-algorithm-xx
jwt.expiration-ms=86400000
